{% extends "base.html" %}
{% block title %}{{ _('Error') }} {{ code }}{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="card auth-card">
    <div class="card-body text-center py-5">
      <div class="app-page-icon mx-auto mb-3"><i class="bi bi-exclamation-triangle"></i></div>
      <p class="text-primary fw-bold small text-uppercase mb-2">Error {{ code }}</p>
      <h1 class="auth-heading mb-2">Something needs attention</h1>
      <p class="auth-subtitle mb-4">{{ message }}</p>
      <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="bi bi-house"></i>Go Home</a>
    </div>
  </div>
</div>
{% endblock %}
